services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: framework
      POSTGRES_PASSWORD: framework
      POSTGRES_DB: framework_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framework -d framework_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: framework_test
      MYSQL_USER: framework
      MYSQL_PASSWORD: framework
    ports:
      - "33069:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 20s
